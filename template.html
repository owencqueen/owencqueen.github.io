<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owen Queen — AI for Science</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@500;600;700&display=swap');

        :root {
            --bg: #f8f6f2;
            --surface: #ffffff;
            --ink: #1f2430;
            --muted: #5b6472;
            --accent: #2f6b70;
            --line: #e5dfd4;
            --pill: #efebe3;
            --shadow: 0 12px 40px rgba(18, 30, 43, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.7;
            min-height: 100vh;
        }

        a {
            color: #1f5e64;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
            transition: color 0.2s ease, background 0.2s ease, text-decoration-thickness 0.2s ease;
        }

        a:hover {
            color: #153f43;
            text-decoration-thickness: 2px;
        }

        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .topbar {
            position: sticky;
            top: 0;
            background: rgba(248, 246, 242, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
            z-index: 10;
        }

        .topbar .bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.25rem;
            padding: 18px 0;
        }

        .brand {
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        nav {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--ink);
            padding: 6px 12px;
            border-radius: 999px;
            text-decoration: none;
        }

        nav a:hover {
            background: var(--pill);
            color: var(--accent);
        }

        main {
            padding-bottom: 4rem;
        }

        .section {
            padding: 56px 0;
            border-bottom: 1px solid var(--line);
        }

        .section-heading {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.7rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        h1, h2, h3 {
            font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        h1 {
            font-size: 2.6rem;
        }

        h2 {
            font-size: 2rem;
        }

        h3 {
            font-size: 1.25rem;
        }

        .hero {
            padding-top: 80px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        .hero-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .hero-card img {
            width: 100%;
            display: block;
        }

        .hero-card .meta {
            padding: 16px 18px;
            display: grid;
            gap: 0.35rem;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .hero-card .links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.4rem;
            justify-content: center;
        }

        .icon-link {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #ffffff;
            color: #1f5e64;
            text-decoration: none;
        }

        .icon-link:hover {
            background: #f3f7f7;
            color: #153f43;
        }

        .icon-link svg {
            width: 18px;
            height: 18px;
            display: block;
            fill: currentColor;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--pill);
            color: var(--muted);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .markdown {
            display: grid;
            gap: 1rem;
        }

        .markdown h1, .markdown h2, .markdown h3 {
            font-family: 'Fraunces', 'Times New Roman', serif;
        }

        .markdown p {
            color: var(--muted);
            font-size: 1.02rem;
        }

        .markdown ul {
            padding-left: 1.2rem;
            color: var(--muted);
            display: grid;
            gap: 0.4rem;
        }

        .markdown li {
            line-height: 1.6;
        }

        #news .news-list {
            padding-left: 1.1rem;
            display: grid;
            gap: 0.4rem;
        }

        #news li {
            list-style: disc;
            padding-left: 0.3rem;
        }

        #news .news-date {
            font-weight: 600;
            color: #000000;
            margin-right: 0.45rem;
        }

        #news .news-text {
            font-weight: 500;
            color: var(--ink);
        }

        .publications-list {
            display: grid;
            gap: 1.25rem;
        }

        .publication {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .pub-main {
            flex: 1;
            display: grid;
            gap: 0.35rem;
        }

        .pub-body p, .pub-main p {
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .pub-venue {
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .pub-authors {
            font-size: 0.95rem;
            color: var(--muted);
        }

        .pub-authors .author-highlight {
            color: var(--ink);
            font-weight: 600;
        }

        .pub-note {
            margin-top: 0.4rem;
        }

        .pub-note p {
            font-size: 0.86rem;
            line-height: 1.45;
            margin: 0;
            color: var(--muted);
        }

        .pub-links {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
        }

        .pub-links a {
            border: 1px solid var(--line);
            padding: 0.4rem 0.85rem;
            border-radius: 10px;
            background: #faf8f4;
            color: var(--ink);
            text-decoration: none;
        }

        .pub-thumb {
            width: 130px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--line);
            display: block;
        }

        .pub-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: var(--accent);
            color: #ffffff;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid var(--accent);
            text-decoration: none;
        }

        .btn.ghost {
            background: transparent;
            color: var(--accent);
        }

        .text-link {
            color: #1f5e64;
            text-decoration-color: rgba(31, 94, 100, 0.5);
        }

        .cv-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            justify-content: space-between;
            gap: 1.5rem;
            align-items: center;
            box-shadow: var(--shadow);
        }

        footer {
            padding: 36px 0;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 900px) {
            .hero-grid {
                grid-template-columns: 1fr;
            }

            .section {
                padding: 60px 0;
            }

            .section-heading {
                flex-direction: column;
                align-items: flex-start;
            }

            nav {
                justify-content: flex-start;
            }

            .publication {
                flex-direction: column;
            }

            .cv-card {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="container bar">
            <span class="brand">Owen Queen</span>
            <nav>
                <a href="#about">About</a>
                <a href="#news">News</a>
                <a href="#publications">Selected Publications</a>
                <a href="#cv">CV</a>
                <a href="/publications.html">All Publications</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="about" class="section hero">
            <div class="container hero-grid">
                <div class="markdown">
                    {{ABOUT}}
                </div>
                <div class="hero-card">
                    <img src="personal.jpeg" alt="Portrait of Owen Queen">
                    <div class="meta">
                        <span>Ph.D. student · Stanford University</span>
                        <span>Knight-Hennessy Scholar</span>
                        <div class="links">
                            <a class="icon-link" href="mailto:oqueen@stanford.edu" aria-label="Email">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M2.5 5.5A2.5 2.5 0 0 1 5 3h14a2.5 2.5 0 0 1 2.5 2.5v13A2.5 2.5 0 0 1 19 21H5a2.5 2.5 0 0 1-2.5-2.5zm2.4-.5L12 10.1 19.1 5zM20 6.3l-5.8 4.2a3.8 3.8 0 0 1-4.4 0L4 6.3V18a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1z"/>
                                </svg>
                            </a>
                            <a class="icon-link" href="https://scholar.google.com/citations?user=ID2aN3QAAAAJ&amp;hl=en" target="_blank" rel="noopener noreferrer" aria-label="Google Scholar">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 3 1 9l11 6 9-4.9V17h2V9z"/>
                                    <path d="M5 12.8V17c0 2.2 3.1 4 7 4s7-1.8 7-4v-4.2l-7 3.8z"/>
                                </svg>
                            </a>
                            <a class="icon-link" href="https://github.com/owencqueen" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 2A10 10 0 0 0 8.8 21.5c.5.1.7-.2.7-.5v-1.9c-3 .7-3.6-1.3-3.6-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.6 1 1.6 1 .9 1.5 2.4 1.1 3 1 .1-.7.4-1.1.7-1.4-2.4-.3-4.9-1.2-4.9-5.3 0-1.2.4-2.1 1-2.9-.1-.3-.4-1.4.1-2.8 0 0 .8-.3 2.9 1.1a9.8 9.8 0 0 1 5.3 0c2-1.4 2.9-1.1 2.9-1.1.5 1.4.2 2.5.1 2.8.6.8 1 1.7 1 2.9 0 4.1-2.5 5-4.9 5.3.4.3.8 1 .8 2.1V21c0 .3.2.6.7.5A10 10 0 0 0 12 2"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="news" class="section">
            <div class="container">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">Updates</p>
                        <h2>News</h2>
                    </div>
                </div>
                <div class="news markdown">
                    {{NEWS}}
                </div>
            </div>
        </section>

        <section id="publications" class="section">
            <div class="container">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">Selected work</p>
                        <h2>Selected publications</h2>
                    </div>
                    <a class="text-link" href="/publications.html">All publications →</a>
                </div>
                <div class="publications-list">
{{SELECTED_PUBLICATIONS}}
                </div>
            </div>
        </section>

        <section id="cv" class="section">
            <div class="container">
                <a class="btn" href="/files/Owen_Queen_CV.pdf">Download CV</a>
            </div>
        </section>
    </main>

</body>
</html>
