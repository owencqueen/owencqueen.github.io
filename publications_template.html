<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Publications — Owen Queen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@500;600;700&display=swap');

        :root {
            --bg: #f8f6f2;
            --surface: #ffffff;
            --ink: #1f2430;
            --muted: #5b6472;
            --accent: #2f6b70;
            --line: #e5dfd4;
            --pill: #efebe3;
            --shadow: 0 12px 40px rgba(18, 30, 43, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.7;
            min-height: 100vh;
        }

        a {
            color: #1f5e64;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 2px;
            transition: color 0.2s ease, background 0.2s ease, text-decoration-thickness 0.2s ease;
        }

        a:hover {
            color: #153f43;
            text-decoration-thickness: 2px;
        }

        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .topbar {
            position: sticky;
            top: 0;
            background: rgba(248, 246, 242, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
            z-index: 10;
        }

        .topbar .bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.25rem;
            padding: 18px 0;
        }

        .brand {
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        nav {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--ink);
            padding: 6px 12px;
            border-radius: 999px;
            text-decoration: none;
        }

        nav a:hover {
            background: var(--pill);
            color: var(--accent);
        }

        main {
            padding: 72px 0 64px 0;
        }

        .section-heading {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.7rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        h1, h2, h3 {
            font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        h1 {
            font-size: 2.3rem;
        }

        .publications-list {
            display: grid;
            gap: 1.25rem;
        }

        .publication {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .pub-main {
            flex: 1;
            display: grid;
            gap: 0.35rem;
        }

        .pub-main p {
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .pub-venue {
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .pub-authors {
            font-size: 0.95rem;
            color: var(--muted);
        }

        .pub-authors .author-highlight {
            color: var(--ink);
            font-weight: 600;
        }

        .pub-note {
            margin-top: 0.4rem;
        }

        .pub-note p {
            font-size: 0.86rem;
            line-height: 1.45;
            margin: 0;
            color: var(--muted);
        }

        .pub-links {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
        }

        .pub-links a {
            border: 1px solid var(--line);
            padding: 0.4rem 0.85rem;
            border-radius: 10px;
            background: #faf8f4;
            color: var(--ink);
            text-decoration: none;
        }

        .pub-thumb {
            width: 120px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--line);
            display: block;
        }

        .pub-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        footer {
            padding: 36px 0;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 900px) {
            main {
                padding-top: 60px;
            }

            .section-heading {
                flex-direction: column;
                align-items: flex-start;
            }

            .publication {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="container bar">
            <span class="brand">Owen Queen</span>
            <nav>
                <a href="/index.html">Home</a>
                <a href="/index.html#publications">Selected</a>
                <a href="/index.html#cv">CV</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">All work</p>
                    <h1>All publications</h1>
                </div>
            </div>
            <div class="publications-list">
{{PUBLICATIONS}}
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Generated from BibTeX + Markdown — automated build.</p>
        </div>
    </footer>
</body>
</html>
